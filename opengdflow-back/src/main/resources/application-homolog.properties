# Perfil homologação (VPS / Linux): Postgres exposto pelo Docker em Tailscale — não use IP público do host para o banco.
# Uso: java -jar app.jar --spring.profiles.active=homolog
# Credenciais: override via .env (SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD) ou variáveis de ambiente.

spring.application.name=opengd
server.port=8080
spring.cloud.compatibility-verifier.enabled=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# JWT
jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key

# Banco: Docker na mesma rede (100.75.19.114:5433) — porta não exposta na internet
spring.datasource.url=jdbc:postgresql://100.75.19.114:5433/opengd_bd
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=br.com.opengd.config.CustomPostgreSQLDialect

# FattureWeb
fattureweb.email=edipocarneiro@gmail.com
