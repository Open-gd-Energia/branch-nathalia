services:

  # --- BACKEND (Spring Boot) ---
  # network_mode: host → o container compartilha a rede do host.
  # Isso permite acessar o container Postgres local (opgdbd em 127.0.0.1:5432)
  # que está mapeado na interface loopback do host. Porta 8080 exposta diretamente.
  backend:
    build:
      context: ./opengdflow-back
    container_name: opengd_back
    network_mode: host
    environment:
      - SPRING_PROFILES_ACTIVE=homolog
      - SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/opengd_bd
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - OPENGD_URL_FRONTEND=${FRONTEND_URL:-http://100.74.229.30:3000}
    restart: unless-stopped

  # --- FRONTEND (Next.js) ---
  frontend:
    build:
      context: ./opengdflow-front
    container_name: opengd_front
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # URL pública usada pelo browser do cliente
      - NEXT_PUBLIC_API_URL=${BACKEND_PUBLIC_URL:-http://100.74.229.30:8080}
      # URL interna usada pelo servidor Next.js (SSR) → backend no host via host-gateway
      - API_URL_SERVER=http://host.docker.internal:8080
      - NEXTAUTH_URL=${FRONTEND_URL:-http://100.74.229.30:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      - backend
    restart: unless-stopped
